# Schema for the preview-colour extension
# Describes options for IDE tooling and runtime validation.

# Extension-level metadata options.
# Configured in _quarto.yml, _metadata.yml, or document front matter:
#   extensions:
#     preview-colour:
#       text: false
#       code: true

$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v2/extension-schema.json

options:
  text:
    type: boolean
    default: false
    description: Enable colour preview in plain text.
  code:
    type: boolean
    default: true
    description: Enable colour preview in inline code.
  glyph:
    type: [string, object]
    description: Glyph character for colour preview marks, or an object with per-format glyphs.
    properties:
      html:
        type: string
        description: Glyph used for HTML output.
      latex:
        type: string
        description: Glyph used for LaTeX output.
      typst:
        type: string
        description: Glyph used for Typst output.
      docx:
        type: string
        description: Glyph used for DOCX output.
      pptx:
        type: string
        description: Glyph used for PPTX output.
      default:
        type: string
        description: Glyph used when no format-specific glyph is set.
  json:
    type: [boolean, string]
    default: false
    description: Export detected colours to a JSON file, where true writes to preview-colour.json and a string sets a custom path.
